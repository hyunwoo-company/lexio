name: Build & Push Server Image

on:
  push:
    branches: [main]
    paths:
      - 'apps/server/**'
      - 'packages/game-logic/**'
      - 'Dockerfile'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/hyunwoo-company/fgg-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      short_sha: ${{ steps.sha.outputs.short_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: sha
        run: echo "short_sha=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-helm-chart:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout helm repo
        uses: actions/checkout@v4
        with:
          repository: hyunwoo-company/k8s-helm
          token: ${{ secrets.HELM_REPO_TOKEN }}
          path: k8s-helm

      - name: Bump image tag in values.yaml
        run: |
          cd k8s-helm
          SHORT_SHA="${{ needs.build-and-push.outputs.short_sha }}"
          NEW_TAG="sha-${SHORT_SHA}"
          # 'tag: "..."' 라인 한 곳만 교체 (apps/fgg-api/values.yaml의 image 블록)
          sed -i -E "s|^(  tag: ).*$|\1\"${NEW_TAG}\"|" apps/fgg-api/values.yaml
          echo "── 변경 결과 ──"
          grep -n "^  tag:" apps/fgg-api/values.yaml || true

      - name: Commit & push
        run: |
          cd k8s-helm
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add apps/fgg-api/values.yaml
          if git diff --cached --quiet; then
            echo "변경 없음, skip"
            exit 0
          fi
          git commit -m "ci: bump fgg-server image to sha-${{ needs.build-and-push.outputs.short_sha }}"
          git push
